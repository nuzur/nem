syntax = "proto3";

option go_package = "nem/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/nuzur/nem";
option java_outer_classname = "ChangeRequestScopeConfig";

package nem;


import "change_request_scope_config_local.proto";
import "change_request_scope_config_remote.proto";

message ChangeRequestScopeConfig {  
    ChangeRequestScopeConfigLocal local = 1;
    ChangeRequestScopeConfigRemote remote = 2;    
}

syntax = "proto3";

option go_package = "nem/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/nuzur/nem";
option java_outer_classname = "ChangeRequestScopeConfigLocal";

package nem;



message ChangeRequestScopeConfigLocal {  
    string agent_uuid = 1;
    string agent_connection_uuid = 2;    
}
